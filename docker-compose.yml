version: '3.8'

services:
  jwschd:
    build:
      context: .
      dockerfile: Dockerfile
    image: jwschd:1.0.0-SNAPSHOT
    container_name: jwschd
    ports:
      - "8080:8080"
      - "8081:8081"
      - "8082:8082"
      - "9090:9090"
    environment:
      - JAVA_OPTS=-Xms256m -Xmx512m -XX:+UseG1GC
      - JWSCH_CONFIG_PATH=/app/config/application.yml
    volumes:
      - ./jwschd/src/main/resources/application.yml:/app/config/application.yml:ro
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8081/health"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 10s
    restart: unless-stopped
    networks:
      - jwsch-network

  prometheus:
    image: prom/prometheus:v2.45.0
    container_name: prometheus
    ports:
      - "9091:9090"
    volumes:
      - ./deploy/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.enable-lifecycle'
    restart: unless-stopped
    networks:
      - jwsch-network

  grafana:
    image: grafana/grafana:10.0.0
    container_name: grafana
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - grafana-data:/var/lib/grafana
    restart: unless-stopped
    networks:
      - jwsch-network

networks:
  jwsch-network:
    driver: bridge

volumes:
  grafana-data: